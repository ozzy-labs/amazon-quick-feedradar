id: amazon-quick
kind: json-api
url: https://aws.amazon.com/api/dirs/items/search?item.directoryId=whats-new-v2&sort_by=item.additionalFields.postDateTime&sort_order=desc&size=100&page=0&item.locale=en_US
name: AWS What's New
tags:
  - aws
  - cloud
filters:
  keywords:
    - Amazon Quick
  excludeKeywords: []
  matchMode: word
  matchFields:
    - title
    - summary
  caseSensitive: false
http:
  method: GET
  headers:
    accept: application/json
pagination:
  type: page
  param: page
  start: 0
  pageSize: 100
  pageSizeParam: size
  totalPath: $.metadata.totalHits
  maxPages: 30
jsonSelectors:
  items: $.items[*].item
  title: $.additionalFields.headline
  link: $.additionalFields.headlineUrl
  publisherId: $.id
  summary: $.additionalFields.postBody
  publishedAt: $.additionalFields.postDateTime
  linkBase: https://aws.amazon.com
facets:
  year:
    type: range
    param: tags.id
    template: whats-new-v2#year#{}
    range:
      - 2004
      - current-year
    step: 1
trustLevel: untrusted
triagePolicy:
  agent: gemini-cli
  confidenceThreshold: 0.7
  rules: |
    重要 (research):
      - 新サービス / 新機能の GA, Preview ローンチ
      - 価格改定 / 料金体系変更
      - リブランド・ブランド統合 (例: QuickSight → Quick)
      - セキュリティ関連 (脆弱性対応、認証方式変更)
      - メジャーな API 変更 / 既存サービスの semantics 変更
    集約 (digest):
      - 既存サービスへの incremental な機能追加 (UI option, filter 追加)
        group: ui-incremental
      - 連携サービス追加 (新 connector, 新 integration)
        group: integrations
      - performance 改善・SLA 向上 announcement
        group: performance-sla
    除外 (dismiss):
      - リージョン拡張のみ (例: "now available in <region>")
      - SDK バージョン bump
      - ドキュメント更新通知
      - 既存リソースの minor 設定追加 (例: "now supports tagging")
