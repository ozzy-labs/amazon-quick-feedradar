id: amazon-quick-now-integrates-with-snowfla-857b80f5
sourceId: amazon-quick
title: Amazon Quick now integrates with Snowflake Cortex AI
url: https://aws.amazon.com/about-aws/whats-new/2026/06/amazon-quick-snowflake-cortex-ai/
publishedAt: 2026-06-11T22:02:00.000Z
fetchedAt: 2026-06-12T21:04:06.066Z
summary: |-
  <p>Amazon Quick now integrates with Snowflake Cortex AI through the Model Context Protocol (MCP), enabling teams to query their Snowflake data and documents using natural language, and automate multi-step workflows directly within their Quick workspace. After setting up the connection using Snowflake's managed MCP server with OAuth authentication, you can ask questions across structured data through Cortex Analyst and retrieve insights from unstructured documents through Cortex Search.</p>
  <p>With this integration, you can build Flows in Quick that orchestrate Snowflake Cortex Agents to execute repeatable, governed workflows with consistent structured output. This is ideal for any multi-step process that spans structured data and unstructured documents. The same MCP connection is also accessible from Quick Chat and other Quick features. For example, users can ask ad-hoc follow-up questions or explore their Snowflake data conversationally alongside their automated flows. Quick intelligently routes relevant prompts to Snowflake Cortex AI and returns contextualized answers alongside enterprise knowledge stored in Quick Spaces, giving teams both the rigor of a structured process and the flexibility of a conversational interface.</p>
  <p>The Snowflake Cortex AI integration with Amazon Quick is available in all <a href="https://docs.aws.amazon.com/quick/latest/userguide/regions.html" target="_blank">AWS Regions</a> where Amazon Quick is available.</p>
  <p>Visit the Amazon Quick website to learn more and <a href="https://aws.amazon.com/quick/" target="_blank">start your Quick free trial</a>. To learn more about the Snowflake Cortex AI integration, read the <a href="https://aws.amazon.com/blogs/machine-learning/automate-aml-alert-triage-with-amazon-quick-and-snowflake-cortex-ai/" target="_blank">blog</a>. To learn more about Quick integrations, visit the <a href="https://aws.amazon.com/quick/integrations/" target="_blank">integrations page</a>.</p>
