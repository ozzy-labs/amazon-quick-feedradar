title: Amazon Quick Sight expands dashboard customization in tables and pivot tables
url: https://aws.amazon.com/about-aws/whats-new/2026/01/amazon-quicksight-expands-dashboard-customization-tables-pivot-tables
publishedAt: 2026-01-20T15:00:00.000Z
fetchedAt: 2026-05-23T16:31:16.104Z
summary: |-
  <p>Building on our recent launch of <a href="https://aws.amazon.com/about-aws/whats-new/2025/11/amazon-quick-sight-dashboard-tables-pivot-tables/" target="_blank">customizable tables and pivot tables</a>, <a href="https://aws.amazon.com/quicksuite/quicksight/" target="_blank">Amazon Quick Sight </a>now enables readers to add or remove fields, change aggregations, and modify formatting directly in dashboards—all without requiring updates from dashboard authors.<br>
  <br>
  These enhanced capabilities empower readers with even greater flexibility to tailor their data views for specific analytical needs. For example, sales managers can add revenue breakdowns by product category to identify growth opportunities, while finance teams can change aggregations from sum to average to better understand spending patterns across departments.<br>
  <br>
  These new customization features are now available in Amazon Quick Sight Enterprise Edition across all <a href="https://docs.aws.amazon.com/quicksight/latest/user/regions-qs.html" target="_blank">supported Amazon Quick Sight regions</a>. To get started with these new customization features, see our <a href="https://aws.amazon.com/blogs/business-intelligence/amazon-quick-sight-expands-dashboard-customization-in-tables-and-pivot-tables/" target="_blank">blog post.</a></p>
