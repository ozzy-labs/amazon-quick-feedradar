id: aws-transform-now-offers-bi-migration-ag-14367973
sourceId: amazon-quick
title: AWS Transform now offers BI migration agents for Power BI and Tableau to
  Amazon Quick
url: https://aws.amazon.com/about-aws/whats-new/2026/05/quick-bi-migration/
publishedAt: 2026-05-01T15:00:00.000Z
fetchedAt: 2026-05-23T16:31:16.104Z
summary: |-
  <p>AWS Transform&nbsp;customers can&nbsp;now&nbsp;use&nbsp;BI migration agents to&nbsp;convert Tableau and Power BI dashboards to Amazon Quick Sight&nbsp;(BI capability of Amazon Quick)&nbsp;assets,&nbsp;helping&nbsp;reduce&nbsp;migration effort from months to days.&nbsp;These agents are&nbsp;built&nbsp;by&nbsp;<a href="https://wavicledata.com/bi-migration-aws-transform/?utm_campaign=42551559-2026%20Q2%20AWS%20Transform&amp;utm_source=AWS%20What%27s%20New%20Post" target="_blank" rel="noopener noreferrer">Wavicle Data Solutions</a>, an AWS Advanced Consulting Partner,&nbsp;leveraging&nbsp;the&nbsp;AWS Transform&nbsp;initiative to create differentiated transformation solutions by integrating specialized agents, tools, knowledge bases, and workflow with AWS Transform’s agentic AI capabilities.&nbsp;Four agents&nbsp;are available&nbsp;for purchase through AWS Marketplace:&nbsp;one&nbsp;Analyzer&nbsp;agent&nbsp;and&nbsp;one&nbsp;Converter&nbsp;agent for&nbsp;each BI migration source (Power BI&nbsp;and&nbsp;Tableau).</p>
  <p>AWS Transform is a collaborative enterprise IT transformation workbench powered by expert agents, agentic AI systems, and continuous learning that accelerates cloud migration, legacy app modernization, and tech debt reduction.&nbsp;These&nbsp;new BI migration agents are embedded into the AWS Transform workflow and use a chat-based interface to assess your source dashboards for migration readiness, then convert them – rebuilding datasets, calculated fields, visualizations,&nbsp;and&nbsp;filters in&nbsp;Amazon Quick Sight.&nbsp;All processing runs within your AWS account; no data leaves your environment. After conversion, your Amazon Quick administrators assign dashboard ownership to BI authors for validation and publishing. Once migrated, your teams can take advantage of Amazon Quick's AI-powered workflows, including natural-language business questions, automated research, and data-driven actions.</p>
  <p>The BI migration agents are available through AWS Marketplace in&nbsp;US&nbsp;East&nbsp;(N. Virginia). They support Quick Sight asset creation in all&nbsp;<a href="https://docs.aws.amazon.com/general/latest/gr/quicksight.html" target="_blank" rel="noopener noreferrer">commercial regions where Amazon Quick Sight is available</a>.&nbsp;To get started, subscribe&nbsp;through&nbsp;AWS Marketplace (<a href="https://aws.amazon.com/marketplace/pp/prodview-p7sor3iihijpg?sr=0-5&amp;ref_=beagle&amp;applicationId=AWSMPContessa&amp;utm_campaign=42551559-2026%20Q2%20AWS%20Transform&amp;utm_source=AWS%20Transform%20-%20EZConvertBI%20-%20Power%20BI%20to%20Quick%20Sight&amp;utm_medium=AWS%20Marketplace%20Page" target="_blank" rel="noopener noreferrer">Power BI</a> or <a href="https://aws.amazon.com/marketplace/pp/prodview-dkpskx3mnmk6m?sr=0-4&amp;ref_=beagle&amp;applicationId=AWSMPContessa&amp;utm_campaign=42551559-2026%20Q2%20AWS%20Transform&amp;utm_source=AWS%20Transform%20-%20EZConvertBI%20-%20Tableau%20to%20Quick%20Sight&amp;utm_medium=AWS%20Marketplace%20Page" target="_blank" rel="noopener noreferrer">Tableau</a>) or&nbsp;contact your AWS account team&nbsp;to explore available programs for free&nbsp;or discounted&nbsp;Amazon Quick migrations. Read more in this&nbsp;<a href="https://aws.amazon.com/blogs/machine-learning/aws-transform-now-automates-bi-migration-to-amazon-quick-in-days/" target="_blank" rel="noopener noreferrer">blog post</a>.</p>
