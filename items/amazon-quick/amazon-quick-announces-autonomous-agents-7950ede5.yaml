id: amazon-quick-announces-autonomous-agents-7950ede5
sourceId: amazon-quick
title: Amazon Quick announces autonomous agents, multi-dataset analytics, and
  redesigned activity feed
url: https://aws.amazon.com/about-aws/whats-new/2026/06/amazon-quick/
publishedAt: 2026-06-17T13:40:00.000Z
fetchedAt: 2026-06-17T21:03:52.328Z
summary: |-
  <p>Today, AWS announces multiple new features for Amazon Quick, including autonomous agents, multi-dataset analytics capabilities, and a redesigned activity feed. Amazon Quick is the AI assistant that connects to popular business applications and learns user workflows. These new capabilities enable Quick to handle recurring tasks continuously while providing unified analytics across multiple data sources.</p>
  <p><br>
  With autonomous agents, users can describe tasks in natural language and set granular autonomy levels—from step-by-step approval to broad goal-based execution. Agents operate continuously to automate workflows like following up on stalled deals, summarizing regulatory changes, and processing purchase orders, eliminating manual repetitive work and notification overload. The new multi-dataset analytics feature enables users to query across data sources including Snowflake and relational databases using natural language, without requiring technical data preparation or pre-joining datasets. Quick inherits semantic intelligence from existing data catalogs such as AWS Glue, Databricks Unity Catalog, and Collibra, while enforcing security through identity propagation that respects existing permissions.</p>
  <p><br>
  The redesigned activity feed provides a personalized, conversational interface where users can prioritize updates using thumbs up/down feedback, reply to emails and Slack messages, and approve requests directly—all without switching between applications. Users can also share Quick applications as public websites, extending collaboration capabilities beyond their organization.</p>
  <p><br>
  To learn more about these new Amazon Quick capabilities, including autonomous agents, multi-dataset analytics., and redesigned activity feed, read the <a href="https://aws.amazon.com/blogs/machine-learning/get-back-hours-every-day-with-amazon-quicks-new-autonomous-agents/" target="_blank">launch blog</a>. You can create an account for free and get started in minutes at <a href="http://aws.com/quick" target="_blank">aws.com/quick</a>.</p>
