title: Amazon Quick generates dashboards from natural language prompts
url: https://aws.amazon.com/about-aws/whats-new/2026/05/amazon-quick-generates-analyses-from-natural-language-prompts/
publishedAt: 2026-05-04T17:00:00.000Z
fetchedAt: 2026-05-23T16:31:16.104Z
summary: |-
  <p>Amazon Quick now generates dashboards from natural language prompts with Generate Analysis. You describe the dashboard you want, select up to three datasets, and review an editable plan before generation. Amazon Quick then produces organized sheets with visuals selected for your data, filter controls for exploring by different dimensions, and calculated fields such as year-over-year growth and month-over-month comparisons.. Generate Analysis reduces dashboard creation from hours of manual configuration to minutes.</p>
  <p>With Generate Analysis, you can describe goals such as &quot;create a sales performance dashboard with revenue trends, regional comparisons, and month-over-month growth&quot; and receive a dashboard ready for refinement. The output works with existing publishing workflows, embedding, CI/CD pipelines, and point-and-click editing.</p>
  <p>At launch, Generate Analysis is available to Enterprise subscription/Author Pro users. Authors also have promotional access to this capability through December 2026 as part of Amazon Quick Enterprise, provided their organization has not restricted access. Generate Analysis is now generally available in all AWS Regions&nbsp;<a href="https://docs.aws.amazon.com/quick/latest/userguide/regions.html#regions-qs" style="background-color: rgb(255, 255, 255);">where Amazon Quick is available</a>.</p>
  <p>To learn more, see&nbsp;<a href="https://docs.aws.amazon.com/quick/latest/userguide/generating-an-analysis.html">Generating an analysis with natural language prompts</a>&nbsp;in the Amazon Quick User Guide. To get started, open any dataset in Amazon Quick and choose Generate analysis.</p>
