id: amazon-quick-now-supports-document-level-cfa7b5f0
sourceId: amazon-quick
title: Amazon Quick now supports document-level access controls for SharePoint
  knowledge bases
url: https://aws.amazon.com/about-aws/whats-new/2026/04/quick-sharepoint-access-control/
publishedAt: 2026-04-23T14:26:00.000Z
fetchedAt: 2026-05-23T16:31:16.104Z
summary: |-
  <p>Amazon Quick now supports document-level access controls (ACLs) for Microsoft SharePoint knowledge bases, enabling organizations to maintain native SharePoint permissions when indexing content. Users with whom knowledge bases are shared can only access documents through Amazon Quick that they have permission to view in SharePoint, ensuring security and compliance with your organization's sharing policies.<br>
  <br>
  Quick combines ACL replication for efficient pre-retrieval filtering with real-time permission checks directly with SharePoint at query time. This dual approach delivers the performance benefits of indexed ACLs while guarding against stale or incorrectly mapped permission data. When a user submits a query, Quick verifies their current permissions with SharePoint before generating a response, ensuring answers are based on live access rights.<br>
  <br>
  This feature is available in all AWS Regions where Amazon Quick is available. To get started, create an admin-managed SharePoint knowledge base in the Amazon Quick console and configure document-level access controls in advanced settings. For more information, see <a href="https://docs.aws.amazon.com/quick/latest/userguide/sharepoint-kb-admin-managed.html">Microsoft SharePoint integration</a> in the Amazon Quick User Guide.<br>
  <br>
  Amazon Quick is available in US East (N. Virginia), US West (Oregon), Asia Pacific (Sydney), Asia Pacific (Tokyo), Europe (Frankfurt), Europe (London), and Europe (Ireland). For more information about Amazon Quick, visit the <a href="https://aws.amazon.com/quick/" target="_blank" rel="noopener noreferrer">Amazon Quick page</a>.</p>
