id: quick-research-now-supports-customer-man-b2511469
sourceId: amazon-quick
title: Quick Research now supports customer managed keys
url: https://aws.amazon.com/about-aws/whats-new/2026/05/amazon-quick-research-cmk
publishedAt: 2026-05-21T07:00:00.000Z
fetchedAt: 2026-06-01T21:05:11.376Z
summary: |-
  <p>Amazon Quick Research now enables customers to encrypt their data using customer-managed keys (CMK) through AWS Key Management Service (KMS).</p>
  <p>This enhancement allows organizations with strict security and compliance requirements to manage their own encryption keys. With customer-managed keys, you gain enhanced security control and comprehensive audit capabilities through AWS CloudTrail integration. You can encrypt your data with your own KMS keys, trace all data access for security auditing, and revoke access to compromised keys within 15 minutes during security incidents. This feature supports multiple CMKs with one default key per AWS account per region, providing the flexibility to manage encryption across different datasets while maintaining granular control over your sensitive business intelligence data.</p>
  <p>Customer-managed keys must be created in the same AWS account and region as your Quick resources, and only symmetric AWS KMS keys are supported.</p>
  <p>This feature is generally available in all AWS Regions&nbsp;<a href="https://docs.aws.amazon.com/quick/latest/userguide/regions.html#regions-qs" target="_blank" rel="noopener noreferrer">where Amazon Quick is available</a>. To learn more, visit the&nbsp;<a href="https://aws.amazon.com/quick/research/" target="_blank" rel="noopener noreferrer">Amazon Quick Research detail page</a>.</p>
