id: amazon-quick-now-supports-cross-account-ecb19d5b
sourceId: amazon-quick
title: Amazon Quick now supports cross-account access for Amazon Athena data sources
url: https://aws.amazon.com/about-aws/whats-new/2026/05/amazon-quick-athena/
publishedAt: 2026-05-08T16:00:00.000Z
fetchedAt: 2026-05-23T16:31:16.104Z
summary: |-
  <p>Today, Amazon Quick is announcing cross-account access for Amazon Athena data sources. This launch enables you to query Athena data&nbsp;residing&nbsp;in a different AWS account(s)&nbsp;from your Quick deployment using IAM role chaining, with Athena query costs billed to the account where the data lives.</p>
  <p>With this feature, administrators can create an Athena data source in Quick by specifying a&nbsp;RunAsRole&nbsp;in the Quick account and a&nbsp;ConsumerAccountRoleArn&nbsp;in the target account where Athena resources&nbsp;reside. Quick uses a role chaining mechanism first assuming the&nbsp;RunAsRole, then chaining into the consumer account role to execute queries. This&nbsp;launch&nbsp;supports multiple roles per consumer account(s), enabling fine-grained access segregation across teams within a single account.&nbsp;&nbsp;</p>
  <p>This feature is now available in all supported Amazon Quick&nbsp;Sight regions&nbsp;<a href="https://docs.aws.amazon.com/quick/latest/userguide/regions.html" target="_blank">here</a>. For more details, read our <a href="https://aws.amazon.com/blogs/machine-learning/from-siloed-data-to-unified-insights-cross-account-athena-access-for-amazon-quick/" target="_blank" rel="noopener noreferrer">blog post</a>.</p>
