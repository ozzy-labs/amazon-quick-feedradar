id: aws-partner-central-agents-now-accelerat-4d31a805
sourceId: amazon-quick
title: AWS Partner Central agents now accelerate co-selling on every deal
url: https://aws.amazon.com/about-aws/whats-new/2026/06/accelerate-co-selling-with-agents/
publishedAt: 2026-06-16T13:00:00.000Z
fetchedAt: 2026-06-16T21:03:41.720Z
summary: |-
  <p>Starting today, AWS Partner Central agents qualify every co-sell opportunity in real time and make recommendations that drive AWS engagement and accelerate deal progression. Building on the <a href="https://aws.amazon.com/blogs/apn/introducing-aws-partner-central-agents/">AWS Partner Central agents</a> released on March 16, 2026, the agent can act on the partner's behalf through conversation to enrich the opportunity details. This eliminates waiting for manual review, so partners build a stronger pipeline and progress deals faster.<br>
  <br>
  Now, each opportunity is matched to a co-sell motion that determines AWS engagement: AWS field-engaged, where an AWS sales team collaborates directly; Agent-engaged, where the agent strengthens the submission to increase AWS engagement; and Partner-led, where the partner drives the deal with agent support. Across all motions, the agent provides customer insights, recommendations, and sales plays, and each opportunity receives an Opportunity Quality Score that measures co-sell readiness and directly influences how AWS engages. The agent recommends how to improve this score, and as the opportunity improves, the score and motion recalculate in real time, moving it closer to AWS engagement.<br>
  <br>
  The new enhanced experience is available today to AWS Partners in all commercial AWS Regions. To get started, log in to AWS Partner Central and access opportunity management. Partners can also use the agentic experience in native AI tools like Amazon Quick and Kiro, or through MCP in their own CRM. See the <a href="https://docs.aws.amazon.com/partner-central/latest/APIReference/partner-central-mcp-server.html">Partner Central agents MCP server guide</a> to get started.</p>
