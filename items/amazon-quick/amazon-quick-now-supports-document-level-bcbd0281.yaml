id: amazon-quick-now-supports-document-level-bcbd0281
sourceId: amazon-quick
title: Amazon Quick now supports document-level access controls for Google Drive
  knowledge bases
url: https://aws.amazon.com/about-aws/whats-new/2026/04/amazon-quick-document-level-access-controls-google-drive/
publishedAt: 2026-04-13T18:35:00.000Z
fetchedAt: 2026-05-23T16:31:16.104Z
summary: |-
  <p>Amazon Quick now supports document-level access controls (ACLs) for Google Drive knowledge bases, enabling organizations to maintain native Google Drive permissions when indexing content. Quick combines ACL replication for efficient pre-retrieval filtering with an additional layer of real-time permission checks directly with Google Drive at query time. This dual approach means you get the performance benefits of indexed ACLs while also guarding against stale or incorrectly mapped permission data. When a user submits a query, Quick verifies their current permissions with Google Drive before generating a response—ensuring answers are based on live access rights.<br>
  <br>
  With document-level access controls, Amazon Quick now respects individual file and folder permissions from Google Drive. This feature is available in all AWS <a href="https://docs.aws.amazon.com/quick/latest/userguide/regions.html#regions-qs" target="_blank">Regions where Amazon Quick is available</a>. </p>
  <p>To get started, create or update a Google Drive knowledge base in the Amazon Quick console and configure document-level access controls in your integration settings. For more information, see <a href="https://docs.aws.amazon.com/quick/latest/userguide/google-drive-integration.html" target="_blank" rel="noopener noreferrer">Google Drive integration</a> in the Amazon Quick User Guide.</p>
