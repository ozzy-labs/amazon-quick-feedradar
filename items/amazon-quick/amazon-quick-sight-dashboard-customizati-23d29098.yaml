title: Amazon Quick Sight dashboard customization now includes tables and pivot tables
url: https://aws.amazon.com/about-aws/whats-new/2025/11/amazon-quick-sight-dashboard-tables-pivot-tables/
publishedAt: 2025-11-21T08:00:00.000Z
fetchedAt: 2026-05-23T16:31:07.036Z
summary: |-
  <p><a href="https://aws.amazon.com/quicksuite/quicksight/">Amazon Quick Sight</a> has expanded customization capabilities to include tables and pivot tables in dashboards. This update enables readers to personalize their data views by sorting, reordering, hiding/showing, and freezing columns—all without requiring updates from dashboard authors.<br>
  <br>
  These capabilities are especially valuable for teams that need to tailor dashboard views for different analytical needs and collaborate across departments. For example, sales managers can quickly sort by revenue to identify top performers, while finance teams can freeze account columns to maintain context in large datasets.<br>
  <br>
  These new customization features are now available in Amazon Quick Sight Enterprise Edition across all <a href="https://docs.aws.amazon.com/quicksight/latest/user/regions-qs.html">supported Amazon Quick Sight regions</a>.&nbsp;Learn how to get started with these new customization features in <a href="https://aws.amazon.com/blogs/business-intelligence/empower-readers-with-customizable-tables-and-pivot-tables-in-amazon-quick-sight/">our blog post.</a></p>
